<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
</head>
<body>

    <h1>Contact Us</h1>

    <p>
        <a href="index.html">Home</a> |
        <a href="contact.html">Contact</a>
    </p>

    <hr>

    <h2>Contact Information</h2>

    <table border="1">
        <tr>
            <th>Department</th>
            <th>Email</th>
            <th>Phone</th>
        </tr>

        <tr>
            <td>Support</td>
            <td>support@example.com</td>
            <td>123-456-7890</td>
        </tr>

        <tr>
            <td>Sales</td>
            <td>sales@example.com</td>
            <td>987-654-3210</td>
        </tr>

        <tr>
            <td>General Inquiry</td>
            <td>info@example.com</td>
            <td>555-555-5555</td>
        </tr>
    </table>

    <hr>

    <h2><em>Please fill out the form below.</em></h2>

    <form>

        <p>
            <label><strong>Name:</strong></label>
            <input type="text" name="name">
        </p>

        <p>
            <label><strong>Email:</strong></label>
            <input type="email" name="email">
        </p>

        <p>
            <label><strong>Phone:</strong></label>
            <input type="tel" name="phone">
        </p>

        <p>
            <label><strong>Message:</strong></label><br>
            <textarea rows="6" cols="40"></textarea>
        </p>

        <p>
            <strong>Favorite Topic:</strong>

            <input type="radio" name="topic" value="HTML"> HTML

            <input type="radio" name="topic" value="CSS"> CSS

            <input type="radio" name="topic" value="JavaScript">
            JavaScript
        </p>

        <hr>

        <input type="submit" value="Send">
        <input type="reset" value="Clear">

    </form>

</body>
</html>
